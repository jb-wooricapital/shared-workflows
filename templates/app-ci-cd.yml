# =============================================================================
# 앱 레포 CI/CD 템플릿
# 이 파일을 앱 레포의 .github/workflows/ci-cd.yml 에 복사하세요.
#
# 수정할 부분:
#   1. app-name: 앱 이름 (ECR 리포지토리 이름이 됨)
#   2. developer: 본인 이름 (k8s/apps/{developer} 디렉토리)
#   3. test job: 본인 언어/프레임워크에 맞게 수정
# =============================================================================

name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ============================================
  # 1단계: 테스트 (앱별 자유 정의)
  # ============================================
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- 여기를 본인 언어에 맞게 수정 ----

      # Python 예시:
      # - uses: actions/setup-python@v5
      #   with:
      #     python-version: '3.12'
      # - run: pip install -r requirements.txt
      # - run: pytest

      # Node.js 예시:
      # - uses: actions/setup-node@v4
      #   with:
      #     node-version: '20'
      # - run: npm ci
      # - run: npm test

      # Go 예시:
      # - uses: actions/setup-go@v5
      #   with:
      #     go-version: '1.22'
      # - run: go test ./...

      # Java 예시:
      # - uses: actions/setup-java@v4
      #   with:
      #     java-version: '21'
      #     distribution: 'temurin'
      # - run: ./gradlew test

      - run: echo "테스트를 여기에 추가하세요"

  # ============================================
  # 2단계: 빌드 & 배포 (공통 - 수정 불필요)
  # main 브랜치 push 시에만 실행
  # ============================================
  deploy:
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    uses: jb-wooricapital/shared-workflows/.github/workflows/build-deploy.yml@main
    with:
      app-name: my-ai-app        # TODO: 앱 이름으로 변경
      developer: developer-a     # TODO: 본인 이름으로 변경
    secrets: inherit
