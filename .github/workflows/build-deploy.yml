# 공통 Reusable Workflow: Docker build → ECR push → values.yaml 이미지 태그 업데이트
# 각 앱 레포에서 호출:
#
#   jobs:
#     deploy:
#       uses: jb-wooricapital/shared-workflows/.github/workflows/build-deploy.yml@main
#       with:
#         app-name: my-ai-app
#       secrets: inherit

name: Build & Deploy

on:
  workflow_call:
    inputs:
      app-name:
        description: "애플리케이션 이름 (K8s deployment name)"
        required: true
        type: string
      dockerfile:
        description: "Dockerfile 경로"
        required: false
        type: string
        default: "./Dockerfile"
      context:
        description: "Docker build context"
        required: false
        type: string
        default: "."

env:
  AWS_REGION: ap-northeast-2
  AWS_ACCOUNT_ID: "106083617966"
  GITOPS_OWNER: jb-wooricapital
  GITOPS_REPO: playground-deploy

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC 인증
      contents: read     # 코드 체크아웃

    steps:
      # 1. 앱 소스코드 체크아웃
      - name: Checkout app source
        uses: actions/checkout@v4

      # 2. AWS 인증 (OIDC)
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/playground-github-actions-role
          aws-region: ${{ env.AWS_REGION }}

      # 3. ECR 로그인
      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      # 4. ECR 리포지토리 생성 (없으면) + Lifecycle Policy 적용
      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories \
            --repository-names ${{ inputs.app-name }} \
            --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository \
            --repository-name ${{ inputs.app-name }} \
            --region ${{ env.AWS_REGION }} \
            --image-scanning-configuration scanOnPush=true

          # Lifecycle Policy: untagged 7일 후 삭제, 태그된 이미지 최근 10개만 유지
          aws ecr put-lifecycle-policy \
            --repository-name ${{ inputs.app-name }} \
            --region ${{ env.AWS_REGION }} \
            --lifecycle-policy-text '{
              "rules": [
                {
                  "rulePriority": 1,
                  "description": "Expire untagged images after 7 days",
                  "selection": {
                    "tagStatus": "untagged",
                    "countType": "sinceImagePushed",
                    "countUnit": "days",
                    "countNumber": 7
                  },
                  "action": { "type": "expire" }
                },
                {
                  "rulePriority": 2,
                  "description": "Keep last 10 tagged images",
                  "selection": {
                    "tagStatus": "any",
                    "countType": "imageCountMoreThan",
                    "countNumber": 10
                  },
                  "action": { "type": "expire" }
                }
              ]
            }'

      # 5. 이미지 태그 생성 (short SHA)
      - name: Generate image tag
        id: tag
        run: |
          SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          TAG="${TIMESTAMP}-${SHORT_SHA}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "Generated tag: ${TAG}"

      # 6. Docker build & push
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ inputs.app-name }}:${{ steps.tag.outputs.tag }}
            ${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ inputs.app-name }}:latest

      # 7. GitOps 레포의 values.yaml 이미지 태그 업데이트
      - name: Update image tag in GitOps repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITOPS_PAT }}
          script: |
            const owner = '${{ env.GITOPS_OWNER }}';
            const repo = '${{ env.GITOPS_REPO }}';
            const path = `k8s/apps/${{ inputs.app-name }}/values.yaml`;
            const tag = '${{ steps.tag.outputs.tag }}';
            const image = `${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ inputs.app-name }}`;

            // 현재 파일 가져오기
            let currentFile;
            try {
              currentFile = await github.rest.repos.getContent({ owner, repo, path });
            } catch (e) {
              core.setFailed(`values.yaml not found: ${path}. 먼저 values.yaml을 생성해주세요.`);
              return;
            }

            // 파일 내용 디코딩
            const content = Buffer.from(currentFile.data.content, 'base64').toString('utf-8');

            // 이미지 태그 업데이트
            const updatedContent = content
              .replace(/tag:\s*"?[\w\.\-]+"?/g, `tag: "${tag}"`)
              .replace(/image:\s*"?[^"\n]+"?/g, `image: "${image}"`);

            // 커밋
            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path,
              message: `deploy(${{ inputs.app-name }}): update image tag to ${tag}`,
              content: Buffer.from(updatedContent).toString('base64'),
              sha: currentFile.data.sha,
              committer: {
                name: 'github-actions[bot]',
                email: 'github-actions[bot]@users.noreply.github.com'
              }
            });

            core.info(`Updated ${path} with tag: ${tag}`);
